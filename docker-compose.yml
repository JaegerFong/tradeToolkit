version: '3.8'

# tradeToolkit Docker Compose 配置
# 支持前后端分离部署

services:
  # FastAPI 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: tradetoolkit-backend:local
    container_name: tradetoolkit-backend
    ports:
      - "8000:8000"
    volumes:
      # 日志目录映射
      - ./logs:/app/logs
      # 配置目录映射
      - ./config:/app/config
      # 数据目录映射
      - ./data:/app/data
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      TZ: "Asia/Shanghai"
      # 日志配置
      TRADINGAGENTS_LOG_LEVEL: "INFO"
      TRADINGAGENTS_LOG_DIR: "/app/logs"
      TRADINGAGENTS_LOG_FILE: "/app/logs/tradingagents.log"
      # Docker专用数据库配置
      PG_HOST: "postgres"
      PG_PORT: "5432"
      PG_USER: "admin"
      PG_PASSWORD: "tradingagents123"
      PG_DATABASE: "tradingagents"
      TRADINGAGENTS_REDIS_URL: redis://:tradingagents123@redis:6379
      TRADINGAGENTS_CACHE_TYPE: redis
      # Docker环境标识
      DOCKER_CONTAINER: "true"
      # API配置
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      # CORS配置
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080,http://localhost:5173"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tradetoolkit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Vue 3 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: tradetoolkit-frontend:local
    container_name: tradetoolkit-frontend
    ports:
      - "3000:80"
    environment:
      TZ: "Asia/Shanghai"
      # 后端API地址
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tradetoolkit-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # PostgreSQL 数据库服务 (可选，本地开发可用外部 PG)
  postgres:
    image: postgres:16-alpine
    container_name: tradetoolkit-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: tradingagents123
      POSTGRES_DB: tradingagents
      TZ: "Asia/Shanghai"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tradetoolkit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tradingagents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"
    profiles:
      - full-stack

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: tradetoolkit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: "Asia/Shanghai"
    command: redis-server --appendonly yes --requirepass tradingagents123
    volumes:
      - redis_data:/data
    networks:
      - tradetoolkit-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # Redis Commander 管理界面（可选）
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: tradetoolkit-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:tradingagents123
    networks:
      - tradetoolkit-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - management

# 数据卷定义
volumes:
  postgres_data:
    driver: local
    name: tradetoolkit_postgres_data
  redis_data:
    driver: local
    name: tradetoolkit_redis_data

# 网络定义
networks:
  tradetoolkit-network:
    driver: bridge
    name: tradetoolkit-network

