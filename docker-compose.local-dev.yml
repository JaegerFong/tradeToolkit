version: "3.8"

services:
  mongodb:
    image: mongo:4.4
    container_name: tradetoolkit-local-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: tradingagents123
      MONGO_INITDB_DATABASE: tradingagentscn
      TZ: Asia/Shanghai
    volumes:
      - tradetoolkit_local_mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/admin -u admin -p tradingagents123 --quiet
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: tradetoolkit-local-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass tradingagents123
    environment:
      TZ: Asia/Shanghai
    volumes:
      - tradetoolkit_local_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tradingagents123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  mongo-express:
    image: mongo-express:latest
    container_name: tradetoolkit-local-mongo-express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: tradingagents123
      ME_CONFIG_MONGODB_URL: mongodb://admin:tradingagents123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - tools

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: tradetoolkit-local-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:tradingagents123
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

volumes:
  tradetoolkit_local_mongodb_data:
  tradetoolkit_local_redis_data:
